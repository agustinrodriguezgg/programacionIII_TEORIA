<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrito de Compras</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="contenedor">

    <h1>Carrito de compras</h1>

    <!-- Formulario para agregar productos -->
    <div class="formulario">

      <div class="campo">
        <label for="inputNombre">Nombre del producto</label>
        <input type="text" id="inputNombre" placeholder="Ej: Mochila" />
      </div>

      <div class="campo">
        <label for="inputPrecio">Precio ($)</label>
        <input type="number" id="inputPrecio" placeholder="Ej: 1500" min="0" step="0.01" />
      </div>

      <button id="btnAgregar">Agregar al carrito</button>

      <p id="msgError"></p>

    </div>

    <!-- Lista de productos agregados -->
    <ul id="listaProductos"></ul>

    <!-- Resumen con el total -->
    <div id="resumen" class="resumen oculto">
      <span>Total acumulado</span>
      <span id="totalTexto">$0.00</span>
      <p class="ayuda">Hacé clic en un producto para eliminarlo</p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
